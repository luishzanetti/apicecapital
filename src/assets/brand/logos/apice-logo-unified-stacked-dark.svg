<!-- Apice · UNIFIED LOGO (stacked, dark bg) · Jarvis 2026-04-17 -->
<!-- Vertical composition · triangle-in-circle on top · Apice + dot + tagline -->
<svg viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice — Global AI Investing">
  <title>Apice · Global AI Investing</title>
  <defs>
    <radialGradient id="stackGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#528FFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#528FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stackFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </radialGradient>
  </defs>
  <!-- Circle container with glow centered at top -->
  <circle cx="160" cy="72" r="56" fill="url(#stackGlow)"/>
  <circle cx="160" cy="72" r="38" fill="url(#stackFill)" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Approved triangle inside -->
  <g transform="translate(138 50) scale(0.6875)">
    <path
      d="M 32 6 L 58 56 L 6 56 Z"
      stroke="#F7F3ED"
      stroke-width="3.6"
      stroke-linejoin="round"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 32 20 L 48 52 L 16 52 Z"
      fill="#F7F3ED"
      opacity="0.20"/>
  </g>
  <!-- Wordmark centered -->
  <text x="160" y="188"
    font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
    font-weight="700" font-size="50" letter-spacing="-1.5"
    text-anchor="middle"
    fill="#FFFFFF">Apice</text>
  <!-- Signature emerald dot -->
  <circle cx="229" cy="185" r="5" fill="#16A661"/>
  <!-- Hairline separator centered -->
  <line x1="92" y1="212" x2="228" y2="212" stroke="#FFFFFF" stroke-width="0.6" opacity="0.25"/>
  <!-- Tagline tracked caps -->
  <text x="160" y="240"
    font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
    font-weight="600" font-size="12" letter-spacing="3.6"
    text-anchor="middle"
    fill="#FFFFFF" opacity="0.55">GLOBAL AI INVESTING</text>
</svg>
