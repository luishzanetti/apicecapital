<!-- Apice · abstract-constellations-01 · v2 · Uma 2026-04-17 -->
<!--
  Metaphor: Growth as network formation. 36 nodes on a jittered 6×6 grid (cell 213u, canvas 1280²);
  jitter offset ±40u via seeded xorshift PRNG (seed=0x16A661). Edges: connect if dist < 280u.
  Primitives: node r=2.5u; edge stroke 0.75u at opacity 0.35. currentColor for theme switch.
  Signature: one emerald node at (760,520), r=4, with 4 emerald threads (1u, opacity 0.85) to nearest neighbors.
  Regenerate: change seed → new jitter → re-resolve edge list. Nodes and edges are deterministic per seed.
-->
