<!-- Apice Capital · iOS Launch Screen (Light) · 2026-04-17 -->
<!--
  Target multi-device: viewBox scales; aspect-fit via ContentMode.Fill in storyboard.
  Reference device: iPhone 15 Pro 1290×2796 @ 3x (430×932 pt).
  Using 1170×2532 viewBox (iPhone 14/15 base) for generic scaling.
  Apple HIG: pure brand, no tagline, no loader. Wordmark optically centered.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532" role="img" aria-label="Apice Capital">
  <defs>
    <style><![CDATA[
      .wm { font-family: 'Geist', 'Inter', system-ui, -apple-system, sans-serif;
            font-weight: 700; font-size: 192px; letter-spacing: -5.76px; fill: #0E0E12; }
      .dot { fill: #16A661; }
    ]]></style>
  </defs>

  <rect width="1170" height="2532" fill="#F7F3ED"/>
  <!-- Wordmark centered — optical center slightly above geometric (48% height) -->
  <text x="585" y="1248" class="wm" text-anchor="middle">Apice</text>
  <!-- Dot at baseline position matching wordmark proportions -->
  <circle cx="788" cy="1234" r="18" class="dot"/>
</svg>
