<!-- Apice · hero-club-page · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" role="img" aria-label="Apice Club — For investors who play the long game.">
  <defs>
    <style>
      .bg { fill: #0E0E12; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -1.68px; fill: #F7F3ED; }
      .dot { fill: #16A661; }
      .headline { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 96px; letter-spacing: -2.88px; fill: #F7F3ED; }
      .tag { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 22px; fill: #F7F3ED; opacity: 0.7; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .rule { stroke: #F7F3ED; stroke-width: 1; opacity: 0.14; }
      .price { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 36px; fill: #F7F3ED; letter-spacing: -1px; }
      .price-lbl { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; fill: #F7F3ED; opacity: 0.55; letter-spacing: 1.5px; text-transform: uppercase; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="600"/>
  <!-- eyebrow -->
  <text class="eyebrow" x="96" y="112">APICE  ·  CLUB TIER</text>
  <line class="rule" x1="96" y1="136" x2="1344" y2="136"/>
  <!-- headline -->
  <text class="headline" x="96" y="280">For investors who</text>
  <text class="headline" x="96" y="386">play the long game.</text>
  <text class="tag" x="96" y="446">ALTIS · Elite Mindset · Capital Game · Monthly private note.</text>
  <!-- right column: price -->
  <g transform="translate(1344,280)">
    <text class="price" text-anchor="end" x="0" y="0">$149.90</text>
    <text class="price-lbl" text-anchor="end" x="0" y="26">PER MONTH</text>
  </g>
  <!-- bottom lockup -->
  <g transform="translate(96,540)">
    <text class="wm" x="0" y="0">Apice</text>
    <circle class="dot" cx="204" cy="-6" r="5"/>
  </g>
</svg>
