<!-- Apice · hero-homepage-desktop · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" role="img" aria-label="Apice homepage hero.">
  <defs>
    <style>
      .bg { fill: #F7F3ED; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -1.92px; fill: #0E0E12; }
      .dot { fill: #16A661; }
      .headline { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 88px; letter-spacing: -2.6px; fill: #0E0E12; }
      .tag { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 24px; fill: #0E0E12; opacity: 0.6; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 2.4px; fill: #16A661; text-transform: uppercase; }
      .rule { stroke: #0E0E12; stroke-width: 1; opacity: 0.1; }
    </style>
  </defs>
  <rect class="bg" width="1440" height="600"/>
  <!-- eyebrow only (nav is separate) -->
  <text class="eyebrow" x="96" y="112">BUILD WEALTH. ONE WEEK AT A TIME.</text>
  <!-- headline -->
  <text class="headline" x="96" y="256">The wealth platform</text>
  <text class="headline" x="96" y="352">that respects your time.</text>
  <!-- support -->
  <text class="tag" x="96" y="420">Weekly DCA on autopilot. AI-guided trade. Academy + Club.</text>
  <text class="tag" x="96" y="456">No hype. No laser eyes. Just discipline and compounding.</text>
  <!-- wordmark stamp bottom-right -->
  <g transform="translate(1344,520)">
    <text class="wm" text-anchor="end" x="0" y="0">Apice</text>
    <circle class="dot" cx="10" cy="-8" r="6"/>
  </g>
  <line class="rule" x1="96" y1="540" x2="1344" y2="540"/>
</svg>
