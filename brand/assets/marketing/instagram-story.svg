<!-- Apice · instagram-story · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="Apice — 7 day streak.">
  <defs>
    <style>
      .bg { fill: #0E0E12; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -1.68px; fill: #F7F3ED; }
      .dot { fill: #16A661; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .big-num { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 420px; letter-spacing: -16px; fill: #16A661; }
      .label { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 72px; letter-spacing: -2px; fill: #F7F3ED; }
      .sub { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 26px; fill: #F7F3ED; opacity: 0.65; }
      .rule { stroke: #F7F3ED; stroke-width: 1; opacity: 0.14; }
      .cta { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 22px; letter-spacing: 2px; fill: #0E0E12; text-transform: uppercase; }
      .cta-bg { fill: #16A661; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1920"/>
  <!-- top lockup -->
  <text class="wm" x="72" y="180">Apice</text>
  <circle class="dot" cx="270" cy="172" r="6"/>
  <line class="rule" x1="72" y1="220" x2="1008" y2="220"/>
  <text class="eyebrow" x="72" y="280">STREAK  ·  LIVE</text>
  <!-- hero number -->
  <text class="big-num" x="540" y="920" text-anchor="middle">7</text>
  <text class="label" x="540" y="1020" text-anchor="middle">day streak</text>
  <text class="sub" x="540" y="1080" text-anchor="middle">Consistency is compounding.</text>
  <!-- progress dots -->
  <g transform="translate(265,1220)">
    <circle cx="0" cy="0" r="18" fill="#16A661"/>
    <circle cx="90" cy="0" r="18" fill="#16A661"/>
    <circle cx="180" cy="0" r="18" fill="#16A661"/>
    <circle cx="270" cy="0" r="18" fill="#16A661"/>
    <circle cx="360" cy="0" r="18" fill="#16A661"/>
    <circle cx="450" cy="0" r="18" fill="#16A661"/>
    <circle cx="540" cy="0" r="18" fill="#16A661"/>
  </g>
  <!-- next milestone -->
  <text class="sub" x="540" y="1330" text-anchor="middle">Next milestone · 30 days · 2x XP</text>
  <!-- CTA button -->
  <rect class="cta-bg" x="240" y="1680" width="600" height="96" rx="48"/>
  <text class="cta" x="540" y="1740" text-anchor="middle">KEEP THE STREAK →</text>
  <!-- footer -->
  <text class="eyebrow" x="540" y="1860" text-anchor="middle" style="fill:#F7F3ED; opacity:0.4">APICE.CAPITAL</text>
</svg>
