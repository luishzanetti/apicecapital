<!-- Apice · tiktok-cover · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-label="Apice TikTok — How I invest $50 a week.">
  <defs>
    <style>
      .bg { fill: #0E0E12; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -1.68px; fill: #F7F3ED; }
      .dot { fill: #16A661; }
      .hook { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 132px; letter-spacing: -4px; fill: #F7F3ED; line-height: 0.9; }
      .accent { fill: #16A661; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .rule { stroke: #F7F3ED; stroke-width: 1; opacity: 0.14; }
      .sub { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 30px; fill: #F7F3ED; opacity: 0.7; }
      .hint { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 20px; letter-spacing: 2px; fill: #F7F3ED; opacity: 0.55; text-transform: uppercase; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1920"/>
  <!-- top lockup -->
  <text class="wm" x="72" y="210">Apice</text>
  <circle class="dot" cx="270" cy="202" r="6"/>
  <text class="eyebrow" x="72" y="264">TIKTOK COVER  ·  :30</text>
  <line class="rule" x1="72" y1="296" x2="1008" y2="296"/>
  <!-- hook stack -->
  <text class="hook" x="72" y="760">How I invest</text>
  <text class="hook accent" x="72" y="892">$50/week</text>
  <text class="hook" x="72" y="1024">without</text>
  <text class="hook" x="72" y="1156">thinking.</text>
  <!-- support -->
  <line class="rule" x1="72" y1="1264" x2="1008" y2="1264"/>
  <text class="sub" x="72" y="1336">Part 1 · The weekly ritual</text>
  <!-- bottom hints -->
  <text class="hint" x="540" y="1820" text-anchor="middle">TAP FOR THE FULL SYSTEM ↓</text>
  <text class="eyebrow" x="540" y="1870" text-anchor="middle" style="fill:#F7F3ED; opacity:0.4">@APICECAPITAL</text>
</svg>
