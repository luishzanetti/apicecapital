<!-- Apice · og-image-academy · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Apice Academy — Learn to invest. Build to last.">
  <defs>
    <style>
      .bg { fill: #0E0E12; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 72px; letter-spacing: -2.16px; fill: #F7F3ED; }
      .dot { fill: #16A661; }
      .headline { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 72px; letter-spacing: -2.2px; fill: #F7F3ED; }
      .tag { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 22px; fill: #F7F3ED; opacity: 0.7; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .stat-num { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 56px; fill: #F7F3ED; letter-spacing: -1.4px; }
      .stat-lbl { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; fill: #F7F3ED; opacity: 0.55; letter-spacing: 1.5px; text-transform: uppercase; }
      .rule { stroke: #F7F3ED; stroke-width: 1; opacity: 0.12; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <!-- lockup -->
  <text class="wm" x="80" y="120">Apice</text>
  <circle class="dot" cx="332" cy="114" r="7"/>
  <text class="eyebrow" x="80" y="164">ACADEMY</text>
  <line class="rule" x1="80" y1="196" x2="1120" y2="196"/>
  <!-- headline -->
  <text class="headline" x="80" y="310">Learn to invest.</text>
  <text class="headline" x="80" y="392">Build to last.</text>
  <text class="tag" x="80" y="444">7 tracks. 52 lessons. Written by investors.</text>
  <!-- stats row -->
  <line class="rule" x1="80" y1="496" x2="1120" y2="496"/>
  <g transform="translate(80,544)">
    <text class="stat-num">52</text>
    <text class="stat-lbl" y="34">LESSONS</text>
  </g>
  <g transform="translate(340,544)">
    <text class="stat-num">7</text>
    <text class="stat-lbl" y="34">TRACKS</text>
  </g>
  <g transform="translate(540,544)">
    <text class="stat-num">6</text>
    <text class="stat-lbl" y="34">LEVELS</text>
  </g>
  <g transform="translate(760,544)">
    <text class="stat-num">230 min</text>
    <text class="stat-lbl" y="34">RUNTIME</text>
  </g>
</svg>
