<!-- Apice · instagram-post-1 · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Apice — Consistency beats brilliance.">
  <defs>
    <style>
      .bg { fill: #F7F3ED; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 64px; letter-spacing: -1.92px; fill: #0E0E12; }
      .dot { fill: #16A661; }
      .headline { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 96px; letter-spacing: -2.88px; fill: #0E0E12; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 18px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .tag { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 26px; fill: #0E0E12; opacity: 0.65; }
      .rule { stroke: #0E0E12; stroke-width: 1; opacity: 0.12; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1080"/>
  <!-- lockup -->
  <text class="wm" x="72" y="136">Apice</text>
  <circle class="dot" cx="298" cy="128" r="7"/>
  <line class="rule" x1="72" y1="170" x2="1008" y2="170"/>
  <!-- eyebrow -->
  <text class="eyebrow" x="72" y="232">VALUE  ·  DISCIPLINE</text>
  <!-- headline block -->
  <text class="headline" x="72" y="420">Consistency</text>
  <text class="headline" x="72" y="516">beats</text>
  <text class="headline" x="72" y="612">brilliance.</text>
  <!-- support -->
  <line class="rule" x1="72" y1="720" x2="540" y2="720"/>
  <text class="tag" x="72" y="778">Weekly DCA. Zero emotion.</text>
  <text class="tag" x="72" y="814">That is the whole edge.</text>
  <!-- footer -->
  <line class="rule" x1="72" y1="940" x2="1008" y2="940"/>
  <text class="eyebrow" x="72" y="988" style="fill:#0E0E12; opacity:0.5">APICE.CAPITAL</text>
</svg>
