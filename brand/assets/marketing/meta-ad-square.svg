<!-- Apice · meta-ad-square · v1 FINAL · media-head 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-label="Apice Ad — Your weekly wealth habit.">
  <defs>
    <style>
      .bg { fill: #F7F3ED; }
      .wm { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 56px; letter-spacing: -1.68px; fill: #0E0E12; }
      .dot { fill: #16A661; }
      .hook { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 88px; letter-spacing: -2.64px; fill: #0E0E12; }
      .tag { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 24px; fill: #0E0E12; opacity: 0.6; }
      .eyebrow { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 3px; fill: #16A661; text-transform: uppercase; }
      .rule { stroke: #0E0E12; stroke-width: 1; opacity: 0.12; }
      .cta { font-family: 'Geist', 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 20px; letter-spacing: 2px; fill: #F7F3ED; text-transform: uppercase; }
      .cta-bg { fill: #0E0E12; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1080"/>
  <text class="wm" x="72" y="132">Apice</text>
  <circle class="dot" cx="270" cy="124" r="6"/>
  <text class="eyebrow" x="72" y="180">PAID  ·  ARCHETYPE A — WEEKLY HABIT</text>
  <line class="rule" x1="72" y1="212" x2="1008" y2="212"/>
  <!-- hook -->
  <text class="hook" x="72" y="440">Your weekly</text>
  <text class="hook" x="72" y="536">wealth habit.</text>
  <text class="tag" x="72" y="598">Set it Monday. Forget it Friday.</text>
  <text class="tag" x="72" y="634">Let discipline do the work.</text>
  <!-- 3 bullets -->
  <g transform="translate(72,720)">
    <circle cx="8" cy="-8" r="5" fill="#16A661"/>
    <text class="tag" x="28">$10 minimum. No fees to start.</text>
  </g>
  <g transform="translate(72,760)">
    <circle cx="8" cy="-8" r="5" fill="#16A661"/>
    <text class="tag" x="28">Bybit-grade custody. Your keys.</text>
  </g>
  <g transform="translate(72,800)">
    <circle cx="8" cy="-8" r="5" fill="#16A661"/>
    <text class="tag" x="28">Pause anytime. Zero lock-in.</text>
  </g>
  <!-- CTA -->
  <rect class="cta-bg" x="72" y="880" width="340" height="72" rx="36"/>
  <text class="cta" x="242" y="925" text-anchor="middle">START FREE →</text>
  <line class="rule" x1="72" y1="998" x2="1008" y2="998"/>
  <text class="eyebrow" x="72" y="1038" style="fill:#0E0E12; opacity:0.5">APICE.CAPITAL</text>
</svg>
