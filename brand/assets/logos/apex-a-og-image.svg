        font-size="56"
        letter-spacing="-1.12"
        text-anchor="middle"
        style="font-variant-ligatures:none">Build Wealth.</text>
  <text x="600" y="502"
        fill="#A1A1AA"
        font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
        font-weight="500"
        font-size="40"
        letter-spacing="-0.40"
        text-anchor="middle"
        style="font-variant-ligatures:none">One Week at a Time.</text>

  <!-- ============== URL FOOTER ============== -->
  <text x="600" y="584"
        fill="#52525B"
        font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
        font-weight="500"
