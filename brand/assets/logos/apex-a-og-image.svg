<!-- Tagline per DECISIONS-LOG D1: "Build Wealth. One Week at a Time." -->
<!-- Replaces public/og-image.svg pending CEO approval. DO NOT overwrite production file yet. -->
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice Capital — Build Wealth. One Week at a Time.">
  <title>Apice Capital</title>
  <desc>Build Wealth. One Week at a Time.</desc>

  <!-- ============== BACKGROUND ============== -->
  <rect x="0" y="0" width="1200" height="630" fill="#0E0E12"/>

  <!-- Subtle radial mesh (per REDESIGN-SPEC gradient-mesh, dark variant) -->
  <defs>
    <radialGradient id="mesh-primary" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh-accent" cx="85%" cy="75%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="630" fill="url(#mesh-primary)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#mesh-accent)"/>

  <!-- ============== LOGO LOCKUP (horizontal, centered-ish upper half) ============== -->
  <!-- Symbol: 64u master scaled 2.5× → 160u tall. translate(460, 170). -->
  <g id="symbol" fill="#A78BFA" transform="translate(460 170) scale(2.5)">
    <path d="M 4 60 L 24 8 L 32 8 L 32 16 L 28 16 L 16 60 Z"/>
    <path d="M 32 8 L 36 8 L 60 60 L 48 60 L 36 16 L 32 16 Z"/>
    <rect x="14" y="34" width="36" height="2"/>
    <path d="M 32 4 L 36 4 L 36 8 L 32 8 Z"/>
  </g>

  <!-- Wordmark: "Apice Capital" — custom A + Geist Semibold text, cap-height 90. -->
  <g id="wordmark-a" fill="#FFFFFF" transform="translate(620 190) scale(1.4)">
    <path d="M 4 60 L 24 8 L 32 8 L 32 16 L 28 16 L 16 60 Z"/>
    <path d="M 32 8 L 36 8 L 60 60 L 48 60 L 36 16 L 32 16 Z"/>
    <rect x="14" y="34" width="36" height="2"/>
    <path d="M 32 4 L 36 4 L 36 8 L 32 8 Z"/>
  </g>
  <text x="712" y="278"
        fill="#FFFFFF"
        font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
        font-weight="600"
        font-size="88"
        letter-spacing="-0.88"
        style="font-variant-ligatures:none">pice Capital</text>

  <!-- ============== TAGLINE (center, below logo) ============== -->
  <text x="600" y="430"
        fill="#F2F2F2"
        font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
