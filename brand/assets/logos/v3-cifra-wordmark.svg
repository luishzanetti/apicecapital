<!-- Apice Capital · v3 · CIFRA Custom Wordmark · concept · Uma 2026-04-17 -->
<!-- APICE in custom caps (flat-apex A, open P bowl, biased C/T terminals) + CAPITAL subtitle. -->
<!-- Production version draws all letters as paths; this concept uses Geist fallback for non-A letters + custom A path. -->
<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="APICE CAPITAL">
  <title>CIFRA wordmark concept</title>
  <g fill="var(--apice-fill, currentColor)" font-family="'Geist','Inter',system-ui,-apple-system,sans-serif">
    <!-- APICE caps, tracked +120, SemiBold 600 -->
    <!-- Custom flat-apex A at position 20 -->
    <g transform="translate(20 20)">
      <path d="M 0 56 L 14 6 L 22 6 L 22 10 L 18 10 L 9 56 Z"/>
      <path d="M 22 6 L 30 6 L 44 56 L 36 56 L 28 24 L 22 24 Z"/>
      <rect x="14" y="4" width="16" height="3"/>
      <rect x="16" y="22" width="14" height="2.5"/>
    </g>
    <!-- Remaining letters "PICE" via text, tracked -->
    <text x="78" y="76" font-size="68" font-weight="600" letter-spacing="0.12em" style="font-variant-ligatures:none">PICE</text>
    <!-- CAPITAL subtitle, tracked +280 -->
    <text x="22" y="108" font-size="22" font-weight="500" letter-spacing="0.28em">CAPITAL</text>
    <!-- Hairline divider APICE / CAPITAL -->
    <rect x="20" y="87" width="180" height="1"/>
  </g>
</svg>
