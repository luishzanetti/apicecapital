<!-- Apice · triangle lockup HORIZONTAL · triangle v3 + "Apice" wordmark · Jarvis 2026-04-17 -->
<!-- Uses the refined peak (v3) as icon + Geist 700 wordmark + emerald dot still part of wordmark -->
<svg viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice">
  <title>Apice triangle lockup horizontal</title>
  <style>
    .wm { font-family: 'Geist','Inter',system-ui,-apple-system,sans-serif; font-weight: 700; font-size: 44px; letter-spacing: -1.32px; fill: currentColor; }
  </style>
  <!-- Refined triangle (v3 geometry scaled to 52u cap-height) -->
  <g transform="translate(14 18)">
    <path d="M 26 8 L 46 40 L 6 40 Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
    <circle cx="26" cy="4" r="2.8" fill="#16A661"/>
  </g>
  <!-- Wordmark "Apice" starting after gap = 0.5× triangle width -->
  <text x="92" y="54" class="wm">Apice</text>
  <!-- Trailing dot (wordmark signature) -->
  <circle cx="216" cy="50" r="4" fill="#16A661"/>
</svg>
