<!-- Apice · triangle-mark v5 · "Split Peak" · two stacked triangles creating depth -->
<!-- Inspired by Fidelity pyramid logic: base foundation + peak ascent · emerald dot caps the summit -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice">
  <title>Apice triangle · split peak</title>
  <!-- Base triangle (darker layer) -->
  <path d="M32 22 L54 52 L10 52 Z" fill="currentColor" opacity="0.5"/>
  <!-- Top peak (brighter layer) -->
  <path d="M32 14 L44 34 L20 34 Z" fill="currentColor"/>
  <!-- Summit dot: emerald signature -->
  <circle cx="32" cy="14" r="3" fill="#16A661"/>
</svg>
