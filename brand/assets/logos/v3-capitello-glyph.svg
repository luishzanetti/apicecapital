<!-- Apice Capital · v3 · CAPITELLO · The Capitello Glyph · concept · Uma 2026-04-17 -->
<!-- Square emblem: top rule + heavier A with serif stubs + bottom rule. 1:1 aspect for favicon friendliness. -->
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice Capitello">
  <title>CAPITELLO Glyph concept</title>
  <g fill="var(--apice-fill, currentColor)">
    <!-- Top rule: 60 wide × 4u thick -->
    <rect x="30" y="20" width="60" height="4"/>
    <!-- Heavy A · stems 9u · crossbar at 35% · monumental weight -->
    <!-- Left stem -->
    <path d="M 36 96
             L 52 40
             L 64 40
             L 64 49
             L 58 49
             L 45 96 Z"/>
    <!-- Right stem -->
    <path d="M 64 40
             L 76 40
             L 92 96
             L 83 96
             L 72 62
             L 64 62 Z"/>
    <!-- Wide flat apex plateau 16u wide -->
    <rect x="52" y="36" width="24" height="4"/>
    <!-- Heavier crossbar at 35% -->
    <rect x="55" y="58" width="18" height="4"/>
    <!-- Serif stubs at base (only visible above 96px) -->
    <rect x="32" y="96" width="16" height="3"/>
    <rect x="80" y="96" width="16" height="3"/>
    <!-- Bottom rule: 60 wide × 4u -->
    <rect x="30" y="108" width="60" height="4"/>
  </g>
</svg>
