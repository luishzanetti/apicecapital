<!-- Apice · UNIFIED LOGO (horizontal, dark bg) · Jarvis 2026-04-17 -->
<!-- Triangle-in-circle with blue glow (screenshot ref) + Apice. wordmark + emerald dot + tagline -->
<svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apice — Global AI Investing">
  <title>Apice · Global AI Investing</title>
  <defs>
    <radialGradient id="uniGlowDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#528FFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#528FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="uniFillDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </radialGradient>
  </defs>
  <!-- Circle container + ambient glow -->
  <circle cx="60" cy="60" r="56" fill="url(#uniGlowDark)"/>
  <circle cx="60" cy="60" r="38" fill="url(#uniFillDark)" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Approved triangle centered in circle -->
  <g transform="translate(38 38) scale(0.6875)">
    <path
      d="M 32 6 L 58 56 L 6 56 Z"
      stroke="#F7F3ED"
      stroke-width="3.6"
      stroke-linejoin="round"
      stroke-linecap="round"
      fill="none"/>
    <path
      d="M 32 20 L 48 52 L 16 52 Z"
      fill="#F7F3ED"
      opacity="0.20"/>
  </g>
  <!-- Wordmark "Apice" -->
  <text x="140" y="64"
    font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
    font-weight="700" font-size="48" letter-spacing="-1.44"
    fill="#FFFFFF">Apice</text>
  <!-- Signature emerald dot (period) -->
  <circle cx="268" cy="60" r="5" fill="#16A661"/>
  <!-- Hairline separator -->
  <line x1="140" y1="80" x2="332" y2="80" stroke="#FFFFFF" stroke-width="0.6" opacity="0.25"/>
  <!-- Tagline · Title Case with text-transform uppercase (for legibility and graceful small-size fallback) -->
  <text x="140" y="100"
    font-family="'Geist','Inter',system-ui,-apple-system,sans-serif"
    font-weight="600" font-size="10" letter-spacing="2.8" text-transform="uppercase"
    fill="#FFFFFF" opacity="0.55">Global AI Investing</text>
</svg>
