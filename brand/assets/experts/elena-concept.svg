    <path d="M76 130 C 76 96, 100 74, 128 74 C 156 74, 180 96, 180 130 L 180 182 C 170 172, 156 170, 146 172 L 146 150 L 110 150 L 110 172 C 100 170, 86 172, 76 182 Z" fill="#7A5536"/>
