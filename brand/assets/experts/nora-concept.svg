<!-- Apice · Expert · Nora · concept v1 · media-engineer 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Nora, the Thesis Builder — concept avatar">
  <defs>
    <linearGradient id="bgNora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#F8F8FB"/>
