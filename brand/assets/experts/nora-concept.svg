    <ellipse cx="142" cy="134" rx="3.2" ry="2.6" fill="#27272A"/>
    <!-- nose hint -->
    <path d="M128 142 Q126 150 130 152" fill="none" stroke="#B28A66" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <!-- mouth -->
    <line x1="120" y1="160" x2="136" y2="160" stroke="#8B5A3F" stroke-width="1.5" stroke-linecap="round"/>
    <!-- silhouette outline -->
    <path d="M78 128 C 78 96, 100 74, 128 74 C 156 74, 178 96, 178 128 C 178 156, 166 176, 148 180 L 148 194 C 170 200, 200 220, 220 256 L 36 256 C 56 220, 86 200, 108 194 L 108 180 C 90 176, 78 156, 78 128 Z" fill="none" stroke="#1F1F23" stroke-width="1.5" stroke-linejoin="round"/>
