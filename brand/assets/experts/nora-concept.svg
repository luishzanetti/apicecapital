    <!-- subtle face outline -->
    <ellipse cx="128" cy="132" rx="40" ry="46" fill="none" stroke="#B28A66" stroke-width="1.5" opacity="0.4"/>
    <!-- hair front (slight side-part, structured) -->
    <path d="M88 118 C 96 96, 120 86, 128 86 C 140 86, 162 96, 168 118 C 158 108, 142 106, 132 110 C 122 114, 108 116, 88 118 Z" fill="#6B4A34"/>
