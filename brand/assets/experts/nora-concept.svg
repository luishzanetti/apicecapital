    <clipPath id="frameNora">
      <rect x="0" y="0" width="256" height="256" rx="60" ry="60"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frameNora)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bgNora)"/>
    <!-- accent motif: 3-point thesis chart, upper-right -->
    <g stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55">
      <polyline points="178,52 198,68 218,42"/>
      <circle cx="178" cy="52" r="2.2" fill="#8B5CF6"/>
      <circle cx="198" cy="68" r="2.2" fill="#8B5CF6"/>
      <circle cx="218" cy="42" r="2.2" fill="#8B5CF6"/>
    </g>
    <!-- shoulders / wardrobe -->
    <path d="M36 256 C 48 204, 96 188, 128 188 C 160 188, 208 204, 220 256 Z" fill="#3F3F46"/>
    <!-- neckline hint -->
    <path d="M108 196 Q128 210 148 196" fill="none" stroke="#27272A" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="114" y="170" width="28" height="24" fill="#E8C9A8"/>
    <!-- hair back -->
    <path d="M78 128 C 78 96, 100 74, 128 74 C 156 74, 178 96, 178 128 L 178 180 C 170 172, 158 170, 148 172 L 148 150 L 108 150 L 108 172 C 98 170, 86 172, 78 180 Z" fill="#6B4A34"/>
