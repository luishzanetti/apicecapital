    <ellipse cx="114" cy="136" rx="3" ry="2.2" fill="#1F1F23"/>
    <ellipse cx="142" cy="136" rx="3" ry="2.2" fill="#1F1F23"/>
    <!-- mouth (flat) -->
    <line x1="120" y1="162" x2="136" y2="162" stroke="#7A4F34" stroke-width="1.5" stroke-linecap="round"/>
    <!-- silhouette outline -->
    <path d="M86 124 C 86 96, 104 76, 128 76 C 152 76, 170 96, 170 124 C 170 154, 158 176, 140 182 L 140 196 C 180 200, 210 220, 214 256 L 42 256 C 46 220, 76 200, 116 196 L 116 182 C 98 176, 86 154, 86 124 Z" fill="none" stroke="#1F1F23" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
