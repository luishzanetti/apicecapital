<!-- Apice · Expert · Kai · concept v1 · media-engineer 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Kai, the Pattern Reader — concept avatar">
  <defs>
    <linearGradient id="bgKai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BAE6FD"/>
      <stop offset="100%" stop-color="#F8F8FB"/>
    </linearGradient>
    <clipPath id="frameKai">
      <rect x="0" y="0" width="256" height="256" rx="60" ry="60"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frameKai)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bgKai)"/>
    <!-- accent motif: upward momentum wave, lower-right -->
    <g stroke="#0EA5E9" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.6">
      <path d="M172 216 Q188 200 196 210 Q204 220 214 196 Q220 180 228 170"/>
    </g>
    <!-- shoulders (square, alert) -->
    <path d="M42 256 L 46 208 L 210 208 L 214 256 Z" fill="#3F3F46"/>
    <!-- crew-neck neckline -->
    <path d="M108 208 Q128 218 148 208" fill="none" stroke="#27272A" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="116" y="174" width="24" height="24" fill="#D8B089"/>
    <!-- hair (short, crisp) -->
    <path d="M86 124 C 86 96, 104 76, 128 76 C 152 76, 170 96, 170 124 L 170 132 C 158 118, 140 110, 128 110 C 116 110, 98 118, 86 132 Z" fill="#2F2A25"/>
    <!-- face -->
    <ellipse cx="128" cy="134" rx="38" ry="44" fill="#E0B990"/>
    <!-- face outline subtle -->
    <ellipse cx="128" cy="134" rx="38" ry="44" fill="none" stroke="#9A7553" stroke-width="1.5" opacity="0.4"/>
    <!-- ear hints -->
    <path d="M90 138 Q86 144 90 150" stroke="#9A7553" stroke-width="1.2" fill="none"/>
    <path d="M166 138 Q170 144 166 150" stroke="#9A7553" stroke-width="1.2" fill="none"/>
