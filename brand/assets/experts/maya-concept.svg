<!-- Apice · Expert · Maya · concept v1 · media-engineer 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Maya, the Ground-Truth Finder — concept avatar">
  <defs>
    <linearGradient id="bgMaya" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2D4F5"/>
      <stop offset="100%" stop-color="#F8F8FB"/>
    </linearGradient>
    <clipPath id="frameMaya">
      <rect x="0" y="0" width="256" height="256" rx="60" ry="60"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frameMaya)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bgMaya)"/>
    <!-- accent motif: 3-node constellation, upper-right -->
    <g stroke="#7C4FB8" stroke-width="1.8" fill="none" opacity="0.6">
      <line x1="182" y1="44" x2="210" y2="56"/>
      <line x1="210" y1="56" x2="198" y2="80"/>
      <line x1="198" y1="80" x2="182" y2="44"/>
      <circle cx="182" cy="44" r="3" fill="#7C4FB8"/>
      <circle cx="210" cy="56" r="3" fill="#7C4FB8"/>
      <circle cx="198" cy="80" r="3" fill="#7C4FB8"/>
    </g>
    <!-- shoulders (casual hoodie/crew) -->
    <path d="M36 256 C 48 206, 92 188, 128 188 C 164 188, 208 206, 220 256 Z" fill="#52525B"/>
    <!-- crew neckline -->
    <path d="M106 198 Q128 210 150 198" fill="none" stroke="#3F3F46" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="116" y="170" width="24" height="24" fill="#BF8F64"/>
    <!-- hair back (chin-length dark warm-black) -->
    <path d="M82 124 C 82 94, 104 72, 128 72 C 152 72, 174 94, 174 124 L 174 178 C 166 170, 150 168, 140 170 L 140 148 L 116 148 L 116 170 C 106 168, 90 170, 82 178 Z" fill="#26201C"/>
    <!-- face -->
    <ellipse cx="128" cy="132" rx="38" ry="44" fill="#D4A375"/>
    <ellipse cx="128" cy="132" rx="38" ry="44" fill="none" stroke="#875D38" stroke-width="1.5" opacity="0.45"/>
    <!-- hair front (side-swept, one subtle streak) -->
    <path d="M90 114 C 98 92, 122 82, 128 82 C 140 82, 162 94, 168 116 C 156 106, 140 104, 130 108 C 120 112, 106 114, 90 114 Z" fill="#26201C"/>
    <!-- optional subtle color streak -->
    <path d="M102 108 Q110 102 118 104" stroke="#7C4FB8" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- glasses -->
    <g stroke="#1F1F23" stroke-width="1.6" fill="none" opacity="0.85">
      <rect x="102" y="128" width="20" height="14" rx="3"/>
      <rect x="134" y="128" width="20" height="14" rx="3"/>
      <line x1="122" y1="135" x2="134" y2="135"/>
    </g>
    <!-- eyes (behind glasses) -->
    <ellipse cx="112" cy="135" rx="2.6" ry="2.2" fill="#1F1F23"/>
    <ellipse cx="144" cy="135" rx="2.6" ry="2.2" fill="#1F1F23"/>
    <!-- mouth (flat, barely closed) -->
    <line x1="120" y1="160" x2="136" y2="160" stroke="#6B3F28" stroke-width="1.5" stroke-linecap="round"/>
    <!-- silhouette outline -->
    <path d="M82 124 C 82 94, 104 72, 128 72 C 152 72, 174 94, 174 124 C 174 152, 162 174, 144 180 L 144 194 C 178 198, 208 220, 220 256 L 36 256 C 48 220, 78 198, 112 194 L 112 180 C 94 174, 82 152, 82 124 Z" fill="none" stroke="#1F1F23" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
