<!-- Apice · Expert · Dante · concept v1 · media-engineer 2026-04-17 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Dante, the Risk Guardian — concept avatar">
  <defs>
    <linearGradient id="bgDante" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9DAE0"/>
      <stop offset="100%" stop-color="#F8F8FB"/>
    </linearGradient>
    <clipPath id="frameDante">
      <rect x="0" y="0" width="256" height="256" rx="60" ry="60"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frameDante)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bgDante)"/>
    <!-- accent motif: minimalist shield silhouette, upper-right -->
    <g opacity="0.5">
      <path d="M196 34 L 220 34 L 220 56 Q 220 72 208 78 Q 196 72 196 56 Z" fill="none" stroke="#52525B" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- sparingly used rose accent dot on shield highlight -->
      <circle cx="208" cy="50" r="2.6" fill="#F43F5E"/>
    </g>
    <!-- shoulders (square, solid) -->
    <path d="M34 256 L 40 204 L 216 204 L 222 256 Z" fill="#27272A"/>
    <!-- jacket lapel hint -->
    <path d="M108 206 L 128 222 L 148 206" fill="none" stroke="#18181B" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="118" y="172" width="22" height="22" fill="#D4A57A"/>
    <!-- hair (short, slight receding) -->
    <path d="M90 122 C 92 100, 110 80, 128 80 C 146 80, 164 100, 166 122 L 166 128 C 154 116, 140 110, 128 110 C 116 110, 102 116, 90 128 Z" fill="#2B2622"/>
    <!-- face -->
    <ellipse cx="128" cy="134" rx="38" ry="46" fill="#DBB084"/>
    <ellipse cx="128" cy="134" rx="38" ry="46" fill="none" stroke="#8E6945" stroke-width="1.5" opacity="0.45"/>
    <!-- subtle jawline definition -->
    <path d="M96 160 Q128 186 160 160" stroke="#8E6945" stroke-width="1.2" fill="none" opacity="0.5"/>
    <!-- eyes (serious, direct) -->
    <ellipse cx="114" cy="136" rx="3.2" ry="2.4" fill="#1F1F23"/>
    <ellipse cx="142" cy="136" rx="3.2" ry="2.4" fill="#1F1F23"/>
    <!-- brow hint (subtle horizontal, not furrowed) -->
    <line x1="108" y1="126" x2="120" y2="126" stroke="#2B2622" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="136" y1="126" x2="148" y2="126" stroke="#2B2622" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <!-- nose hint -->
    <path d="M128 144 Q126 154 130 156" fill="none" stroke="#8E6945" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <!-- mouth (flat) -->
    <line x1="120" y1="164" x2="136" y2="164" stroke="#6B3F28" stroke-width="1.5" stroke-linecap="round"/>
    <!-- silhouette outline -->
    <path d="M90 122 C 92 98, 110 80, 128 80 C 146 80, 164 98, 166 122 C 166 158, 152 178, 138 184 L 138 198 C 176 200, 210 220, 222 256 L 34 256 C 46 220, 80 200, 118 198 L 118 184 C 104 178, 90 158, 90 122 Z" fill="none" stroke="#0E0E12" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
