<!-- Apice · abstract-threads-01 · v2 · Uma 2026-04-17 -->
<!--
  Metaphor: Growth as fabric. Two directional thread families weave across the canvas at 60°,
  with density increasing left-to-right (sparse start, dense weave at right — the fabric forms).
  Construction:
    - Family +60°: parallel lines with slope tan(60°) ≈ 1.732 (dx=1, dy=1.732)
    - Family -60°: parallel lines with slope tan(-60°) ≈ -1.732
    - Spacing function: s(x) = 120 - 0.07x  → spacing tightens as x grows (120u at x=0 → ~30u at x=1280)
    - Stroke 1.5u baseline primitive, currentColor, opacity 0.4
    - Signature: one diagonal in emerald #16A661 at 2u, running through the densest zone (x≈1080)
  Regenerate: given spacing function, emit lines at intercepts where each family crosses y=0/canvas.
  Tall aspect (1280×1600) — ideal for side panels, full-page marketing, splash/loading screens.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1600" role="img" aria-label="Apice motif — threads" preserveAspectRatio="xMidYMid slice">
  <title>Threads</title>
  <desc>Abstract motif: growth as fabric — two families of 60° lines weave, density rising left to right.</desc>
  <g stroke="currentColor" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <line x1="-800" y1="0" x2="124" y2="1600"/>
    <line x1="-680" y1="0" x2="244" y2="1600"/>
    <line x1="-560" y1="0" x2="364" y2="1600"/>
